<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>排队系统</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f172a; --bg-card: #1e293b; --text: #e2e8f0; --muted: #94a3b8;
  --primary: #3b82f6; --success: #22c55e; --danger: #ef4444; --warning: #f59e0b;
  --border: #334155;
}
body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; min-height: 100vh; }
.container { max-width: 640px; margin: 0 auto; padding: 20px; }
.card { background: var(--bg-card); border-radius: 12px; padding: 24px; margin-bottom: 16px; border: 1px solid var(--border); }
h2 { font-size: 18px; margin-bottom: 16px; }
.btn { padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all .2s; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { opacity: .85; }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { opacity: .85; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { opacity: .85; }
.btn-warning { background: var(--warning); color: #000; }
.btn-warning:hover { opacity: .85; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { background: var(--bg-card); }
.btn-lg { padding: 14px 40px; font-size: 16px; }
.btn-block { display: block; width: 100%; }
input, select { width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; }
input:focus, select:focus { outline: none; border-color: var(--primary); }
.form-group { margin-bottom: 12px; }
.flex { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.mb { margin-bottom: 16px; }
.tabs { display: flex; gap: 8px; margin-bottom: 16px; }
.tab { padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; border: 1px solid var(--border); background: transparent; color: var(--muted); }
.tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
.badge-green { background: rgba(34,197,94,.15); color: var(--success); }
.badge-blue { background: rgba(59,130,246,.15); color: var(--primary); }
.badge-yellow { background: rgba(245,158,11,.15); color: var(--warning); }
.worker-row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--bg); border-radius: 10px; margin-bottom: 8px; border: 1px solid var(--border); }
.worker-row .pos { font-size: 24px; font-weight: 700; width: 36px; text-align: center; }
.worker-row .pos.p1 { color: var(--warning); }
.worker-row .pos.p2 { color: #94a3b8; }
.worker-row .pos.p3 { color: #a16207; }
.worker-row .name { flex: 1; font-size: 16px; font-weight: 600; }
.worker-row .status { font-size: 12px; }
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 8px; font-weight: 600; z-index: 999; animation: fadeIn .3s; }
.toast-success { background: var(--success); color: #fff; }
.toast-error { background: var(--danger); color: #fff; }
@keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
.header { text-align: center; padding: 20px 0 8px; }
.header h1 { font-size: 24px; }
.header .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
#loginModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: center; justify-content: center; }
#loginModal .card { width: 360px; }
.my-status { text-align: center; padding: 20px; }
.my-status .icon { font-size: 48px; margin-bottom: 12px; }
.my-status .status-text { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.my-status .hint { color: var(--muted); font-size: 13px; }
</style>
</head>
<body>

<div class="header">
  <h1>打手排队系统</h1>
  <div class="sub">上线排队 → 按序派单 → 完成归队</div>
</div>

<div class="container">

  <!-- ========== 打手登录/注册 ========== -->
  <div id="workerLoginPanel" class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')" id="tabLogin">登录</button>
      <button class="tab" onclick="switchTab('register')" id="tabReg">注册</button>
    </div>

    <div id="loginForm">
      <div class="form-group"><input id="loginName" placeholder="打手名"></div>
      <div class="form-group"><input id="loginPass" type="password" placeholder="密码"></div>
      <button class="btn btn-primary btn-block" onclick="workerLogin()">登录</button>
    </div>

    <div id="regForm" style="display:none;">
      <div class="form-group"><input id="regName" placeholder="打手名"></div>
      <div class="form-group"><input id="regPass" type="password" placeholder="密码（至少4位）"></div>
      <button class="btn btn-success btn-block" onclick="workerRegister()">注册</button>
    </div>
  </div>

  <!-- ========== 打手工作面板 ========== -->
  <div id="workerWorkPanel" style="display:none;">
    <!-- 我的状态 -->
    <div class="card my-status" id="workerMyStatus">
    </div>

    <!-- 接单类型 -->
    <div class="card" id="workerTagsCard" style="display:none;">
      <h2>我想接的类型</h2>
      <div class="flex" id="workerTagsList" style="gap:8px;"></div>
    </div>

    <!-- 排队列表 -->
    <div class="card">
      <h2>当前排队</h2>
      <div id="queueListView"></div>
    </div>

    <div class="flex" style="justify-content:center;gap:12px;">
      <button class="btn btn-outline" onclick="workerLogout()">退出登录</button>
    </div>
  </div>

  <!-- ========== 管理端 ========== -->
  <div id="adminPanel" style="display:none;">
    <div class="flex" style="justify-content:space-between;margin-bottom:16px;">
      <h2 style="margin:0;">管理面板</h2>
      <button class="btn btn-outline" onclick="adminLogout()">退出管理</button>
    </div>

    <!-- 在线排队 -->
    <div class="card">
      <h2>在线排队</h2>
      <div id="adminOnlineList"></div>
      <button id="btnDispatchNext" class="btn btn-primary btn-block mb" style="margin-top:8px;" onclick="dispatchNextInLine()">派单给排第一的打手</button>
    </div>

    <!-- 忙碌中 -->
    <div class="card">
      <h2>忙碌中</h2>
      <div id="adminBusyList"></div>
    </div>

    <!-- 离线 -->
    <div class="card">
      <h2>离线打手</h2>
      <div id="adminOfflineList"></div>
    </div>
  </div>

</div>

<!-- 管理登录弹窗 -->
<div id="loginModal">
  <div class="card">
    <h2>管理登录</h2>
    <div class="form-group"><input id="adminPassword" type="password" placeholder="输入管理密码" onkeydown="if(event.key==='Enter')doAdminLogin()"></div>
    <div class="flex">
      <button class="btn btn-outline btn-block" onclick="hideAdminLogin()">取消</button>
      <button class="btn btn-primary btn-block" onclick="doAdminLogin()">登录</button>
    </div>
  </div>
</div>

<!-- 预计停止时间弹窗 -->
<div id="endTimeModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;">
  <div class="card" style="width:360px;">
    <h2>预计接单到几点？</h2>
    <div class="form-group"><input id="endTimeInput" type="time"></div>
    <div class="form-group"><label style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;"><input type="checkbox" id="noEndTime" onchange="document.getElementById('endTimeInput').disabled=this.checked"> 还在蹲，不确定结束时间</label></div>
    <div class="flex">
      <button class="btn btn-outline btn-block" onclick="hideEndTimeModal()">取消</button>
      <button class="btn btn-success btn-block" onclick="confirmGoOnline()">确认上线</button>
    </div>
  </div>
</div>

<script>
// ========== 全局状态 ==========
let currentRole = sessionStorage.getItem('admin_auth') === '1' ? 'admin' : 'worker';
let currentWorker = sessionStorage.getItem('worker_name') || '';
let myStatus = null; // null|{online,busy}
let myTags = [];
let workerStatuses = [];
let adminTagFilter = ''; // 管理端标签筛选

// ========== API ==========
async function api(url, options = {}) {
  try {
    const res = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...options });
    if (!res.ok) { const err = await res.json(); throw new Error(err.error || '请求失败'); }
    return await res.json();
  } catch (e) { toast(e.message, 'error'); throw e; }
}

// ========== Toast ==========
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = 'toast toast-' + type;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2000);
}

// ========== 数据 ==========
const ALL_TAGS = ['监狱小时', '监狱体验', '赌红', '哈夫币', '核电站'];

async function refresh() {
  workerStatuses = await api('/api/workers/status');
  if (currentWorker) {
    const me = workerStatuses.find(w => w.name === currentWorker);
    myStatus = me || null;
    myTags = me ? me.tags : [];
  }
  renderAll();
}

// ========== 标签页切换 ==========
function switchTab(tab) {
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('regForm').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('tabLogin').className = 'tab ' + (tab === 'login' ? 'active' : '');
  document.getElementById('tabReg').className = 'tab ' + (tab === 'register' ? 'active' : '');
}

// ========== 打手注册/登录/登出 ==========
async function workerLogin() {
  const name = document.getElementById('loginName').value.trim();
  const password = document.getElementById('loginPass').value;
  if (!name || !password) { toast('请填写完整', 'error'); return; }
  await api('/api/workers/login', { method: 'POST', body: JSON.stringify({ name, password }) });
  sessionStorage.setItem('worker_name', name);
  currentWorker = name;
  currentRole = 'worker';
  document.getElementById('loginPass').value = '';
  toast('欢迎回来，' + name + '！');
  refresh();
}

async function workerRegister() {
  const name = document.getElementById('regName').value.trim();
  const password = document.getElementById('regPass').value;
  if (!name) { toast('请输入打手名', 'error'); return; }
  if (!password || password.length < 4) { toast('密码至少4位', 'error'); return; }
  await api('/api/workers/register', { method: 'POST', body: JSON.stringify({ name, password }) });
  sessionStorage.setItem('worker_name', name);
  currentWorker = name;
  currentRole = 'worker';
  document.getElementById('regName').value = '';
  document.getElementById('regPass').value = '';
  toast('注册成功，欢迎 ' + name + '！');
  refresh();
}

function workerLogout() {
  sessionStorage.removeItem('worker_name');
  currentWorker = '';
  myStatus = null;
  toast('已退出');
  renderAll();
}

// ========== 打手操作 ==========
async function toggleOnline() {
  // 如果当前已在线，直接下线
  if (myStatus && myStatus.online) {
    await api('/api/workers/toggle-online', { method: 'POST', body: JSON.stringify({ name: currentWorker }) });
    refresh();
    return;
  }
  // 上线前弹出时间选择
  document.getElementById('endTimeModal').style.display = 'flex';
  document.getElementById('endTimeInput').value = '';
  document.getElementById('noEndTime').checked = false;
  document.getElementById('endTimeInput').disabled = false;
}

function hideEndTimeModal() {
  document.getElementById('endTimeModal').style.display = 'none';
}

async function confirmGoOnline() {
  const noEnd = document.getElementById('noEndTime').checked;
  const timeStr = document.getElementById('endTimeInput').value;
  let endTime = null;
  if (!noEnd && timeStr) {
    // 把 HH:MM 转成今天的 timestamp
    const [h, m] = timeStr.split(':');
    const now = new Date();
    now.setHours(parseInt(h), parseInt(m), 0, 0);
    endTime = now.getTime();
  }
  hideEndTimeModal();
  await api('/api/workers/toggle-online', { method: 'POST', body: JSON.stringify({ name: currentWorker, end_time: endTime }) });
  refresh();
}

async function toggleTag(tag) {
  if (myTags.includes(tag)) {
    myTags = myTags.filter(t => t !== tag);
  } else {
    myTags = [...myTags, tag];
  }
  await api('/api/workers/tags', { method: 'POST', body: JSON.stringify({ name: currentWorker, tags: myTags }) });
  renderWorkerTags();
}

function renderWorkerTags() {
  const div = document.getElementById('workerTagsList');
  div.innerHTML = ALL_TAGS.map(tag => {
    const checked = myTags.includes(tag);
    return '<label style="' +
      'padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;border:2px solid;' +
      'transition:all .2s;' +
      (checked
        ? 'background:rgba(34,197,94,.15);border-color:var(--success);color:var(--success);'
        : 'background:transparent;border-color:var(--border);color:var(--muted);'
      ) +
      '">' +
      '<input type="checkbox" style="display:none;" ' + (checked ? 'checked' : '') + ' onchange="toggleTag(\'' + tag + '\')">' +
      tag +
      '</label>';
  }).join('');
}

async function completeWork() {
  await api('/api/workers/complete', { method: 'POST', body: JSON.stringify({ name: currentWorker }) });
  toast('已完成，回到排队队伍！');
  refresh();
}

// ========== 管理端 ==========
function showAdminLogin() {
  document.getElementById('loginModal').style.display = 'flex';
  document.getElementById('adminPassword').focus();
  document.getElementById('adminPassword').value = '';
}
function hideAdminLogin() { document.getElementById('loginModal').style.display = 'none'; }

async function doAdminLogin() {
  const pw = document.getElementById('adminPassword').value;
  try {
    await api('/api/admin/login', { method: 'POST', body: JSON.stringify({ password: pw }) });
    sessionStorage.setItem('admin_auth', '1');
    currentRole = 'admin';
    hideAdminLogin();
    refresh();
  } catch (e) {}
}
function adminLogout() {
  sessionStorage.removeItem('admin_auth');
  currentRole = 'worker';
  toast('已退出管理');
  renderAll();
}

// ========== 派单 ==========
async function dispatchWorker(name) {
  try {
    await api('/api/workers/dispatch', { method: 'POST', body: JSON.stringify({ name }) });
    toast('已派单给 ' + name);
    refresh();
  } catch (e) {}
}

async function undispatchWorker(name) {
  try {
    await api('/api/workers/undispatch', { method: 'POST', body: JSON.stringify({ name }) });
    toast('已取消派单，' + name + ' 回到排队');
    refresh();
  } catch (e) {}
}

function dispatchNextInLine() {
  let online = workerStatuses.filter(w => w.online && !w.busy);
  if (adminTagFilter) online = online.filter(w => w.tags && w.tags.includes(adminTagFilter));
  const next = online[0];
  if (!next) { toast('没有在线等待的打手', 'error'); return; }
  dispatchWorker(next.name);
}

function setTagFilter(tag) {
  adminTagFilter = tag;
  renderAdmin();
}

async function deleteWorker(name) {
  if (!confirm('确定删除打手「' + name + '」？此操作不可恢复。')) return;
  try {
    await api('/api/workers/' + encodeURIComponent(name), { method: 'DELETE' });
    toast('已删除 ' + name);
    refresh();
  } catch (e) {}
}

// ========== 渲染 ==========
function esc(str) { if (!str) return ''; const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

function formatEndTime(timestamp) {
  if (!timestamp) return '';
  const d = new Date(timestamp);
  return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
}

function renderAll() {
  // 面板显隐
  document.getElementById('adminPanel').style.display = currentRole === 'admin' ? 'block' : 'none';
  document.getElementById('workerLoginPanel').style.display = (currentRole !== 'admin' && !currentWorker) ? 'block' : 'none';
  document.getElementById('workerWorkPanel').style.display = (currentRole !== 'admin' && currentWorker) ? 'block' : 'none';

  if (currentRole === 'admin') renderAdmin();
  else if (currentWorker) renderWorker();
}

function renderAdmin() {
  let online = workerStatuses.filter(w => w.online && !w.busy);
  const busy = workerStatuses.filter(w => w.busy);
  const offline = workerStatuses.filter(w => !w.online && !w.busy);

  // 标签筛选
  if (adminTagFilter) {
    online = online.filter(w => w.tags && w.tags.includes(adminTagFilter));
  }

  // 标签筛选按钮
  const filterDiv = document.createElement('div');
  filterDiv.className = 'flex';
  filterDiv.style.cssText = 'margin-bottom:12px;gap:6px;';
  filterDiv.innerHTML = '<button class="btn btn-sm ' + (adminTagFilter === '' ? 'btn-primary' : 'btn-outline') + '" onclick="setTagFilter(\'\')" style="padding:4px 12px;font-size:12px;">全部</button>' +
    ALL_TAGS.map(t => '<button class="btn btn-sm ' + (adminTagFilter === t ? 'btn-primary' : 'btn-outline') + '" onclick="setTagFilter(\'' + t + '\')" style="padding:4px 12px;font-size:12px;">' + t + '</button>').join('');
  // 把筛选按钮放到在线排队卡片
  const onlineCard = document.querySelector('#adminPanel .card:nth-child(2)');
  const existingFilter = document.getElementById('tagFilterRow');
  if (existingFilter) existingFilter.remove();
  filterDiv.id = 'tagFilterRow';
  if (onlineCard) {
    const heading = onlineCard.querySelector('h2');
    if (heading) heading.after(filterDiv);
  }

  // 渲染标签小标签
   function renderTags(tags) {
     if (!tags || tags.length === 0) return '';
     return tags.map(t => '<span style="background:rgba(59,130,246,.12);color:var(--primary);padding:1px 8px;border-radius:10px;font-size:11px;font-weight:600;margin-left:4px;">' + esc(t) + '</span>').join('');
   }

  // 在线排队
  const onlineDiv = document.getElementById('adminOnlineList');
  if (online.length === 0) {
    onlineDiv.innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted);">暂无打手排队</div>';
  } else {
    onlineDiv.innerHTML = online.map((w, i) => {
      const posClass = i === 0 ? 'p1' : i === 1 ? 'p2' : i === 2 ? 'p3' : '';
      const endInfo = w.end_time ? '<span style="font-size:11px;color:var(--muted);margin-left:8px;">到 ' + formatEndTime(w.end_time) + '</span>' : '';
      return '<div class="worker-row">' +
        '<span class="pos ' + posClass + '">#' + (i + 1) + '</span>' +
        '<div style="flex:1;">' +
        '<span style="font-weight:600;">' + esc(w.name) + '</span>' + endInfo +
        renderTags(w.tags) +
        '</div>' +
        '<button class="btn btn-primary" onclick="dispatchWorker(\'' + esc(w.name) + '\')">派单</button>' +
        '</div>';
    }).join('');
  }
  document.getElementById('btnDispatchNext').style.display = online.length > 0 ? 'block' : 'none';
  document.getElementById('btnDispatchNext').textContent = '派单给排第一的打手（' + online[0]?.name + '）';

  // 忙碌中
  const busyDiv = document.getElementById('adminBusyList');
  if (busy.length === 0) {
    busyDiv.innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted);">暂无忙碌打手</div>';
  } else {
    busyDiv.innerHTML = busy.map(w =>
      '<div class="worker-row" style="border-color:rgba(245,158,11,.3);">' +
      '<span style="font-size:20px;">🔨</span>' +
      '<div style="flex:1;">' +
      '<span style="font-weight:600;">' + esc(w.name) + '</span>' +
      renderTags(w.tags) +
      '</div>' +
      '<span class="badge badge-yellow">忙碌中</span>' +
      '<button class="btn btn-outline" onclick="undispatchWorker(\'' + esc(w.name) + '\')" style="margin-left:auto;">取消派单</button>' +
      '</div>'
    ).join('');
  }

  // 离线
  const offlineDiv = document.getElementById('adminOfflineList');
  if (offline.length === 0) {
    offlineDiv.innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted);">所有打手都在线</div>';
  } else {
    offlineDiv.innerHTML = offline.map(w =>
      '<div class="worker-row" style="opacity:.7;">' +
      '<span style="font-size:20px;">💤</span>' +
      '<div style="flex:1;">' +
      '<span style="font-weight:600;">' + esc(w.name) + '</span>' +
      renderTags(w.tags) +
      '</div>' +
      '<span class="badge" style="color:var(--muted);">离线</span>' +
      '<button class="btn btn-danger" style="padding:4px 10px;font-size:12px;margin-left:8px;" onclick="deleteWorker(\'' + esc(w.name) + '\')">删除</button>' +
      '</div>'
    ).join('');
  }
}

function renderWorker() {
  const myself = workerStatuses.find(w => w.name === currentWorker);
  const online = workerStatuses.filter(w => w.online && !w.busy);

  // 我的状态
  const statusDiv = document.getElementById('workerMyStatus');
  if (!myself || !myself.online) {
    // 不在线
    statusDiv.innerHTML =
      '<div class="icon">💤</div>' +
      '<div class="status-text">你当前已下线</div>' +
      '<div class="hint">点击按钮上线加入排队</div>' +
      '<button class="btn btn-success btn-lg" style="margin-top:16px;" onclick="toggleOnline()">上线排队</button>';
  } else if (myself.busy) {
    // 忙碌中
    statusDiv.innerHTML =
      '<div class="icon">🔨</div>' +
      '<div class="status-text" style="color:var(--warning);">已派单给你，正在干活</div>' +
      '<div class="hint">完成后点按钮归队</div>' +
      '<button class="btn btn-warning btn-lg" style="margin-top:16px;" onclick="completeWork()">完成，重新排队</button>';
  } else {
    // 在线排队
    const pos = online.findIndex(w => w.name === currentWorker) + 1;
    const endStr = myself && myself.end_time ? formatEndTime(myself.end_time) : '';
    statusDiv.innerHTML =
      '<div class="icon">⏳</div>' +
      '<div class="status-text" style="color:var(--success);">排队中 · 第 ' + pos + ' 位</div>' +
      '<div class="hint">等待管理员派单</div>' +
      (endStr ? '<div style="margin-top:8px;font-size:12px;color:var(--muted);">预计接单到 ' + endStr + '</div>' : '<div style="margin-top:8px;font-size:12px;color:var(--muted);">不确定结束时间</div>') +
      '<button class="btn btn-outline btn-lg" style="margin-top:16px;" onclick="toggleOnline()">下线</button>';
  }

  // 接单类型标签
  document.getElementById('workerTagsCard').style.display = 'block';
  renderWorkerTags();

  // 排队列表
  const queueDiv = document.getElementById('queueListView');
  if (online.length === 0) {
    queueDiv.innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted);">排队队伍为空</div>';
  } else {
    queueDiv.innerHTML = online.map((w, i) => {
      const isMe = w.name === currentWorker;
      const posClass = i === 0 ? 'p1' : i === 1 ? 'p2' : i === 2 ? 'p3' : '';
      const tagBadges = (w.tags && w.tags.length > 0) ? '<span style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;">' + w.tags.map(t => '<span style="background:rgba(59,130,246,.12);color:var(--primary);padding:1px 8px;border-radius:10px;font-size:11px;font-weight:600;">' + esc(t) + '</span>').join('') + '</span>' : '';
      const endInfo = w.end_time ? '<span style="font-size:11px;color:var(--muted);margin-left:8px;">到 ' + formatEndTime(w.end_time) + '</span>' : '';
      return '<div class="worker-row' + (isMe ? '" style="border-color:var(--success);"' : '') + '' +
        '<span class="pos ' + posClass + '">#' + (i + 1) + '</span>' +
        '<div style="flex:1;">' +
        '<span class="name" style="display:block;">' + esc(w.name) + endInfo + '</span>' +
        tagBadges +
        '</div>' +
        (isMe ? '<span class="badge badge-green">你</span>' : '') +
        '</div>';
    }).join('');
  }
}

// ========== 自动刷新 ==========
refresh();
setInterval(refresh, 3000);

// 底部管理入口
document.addEventListener('DOMContentLoaded', () => {
  const footer = document.createElement('div');
  footer.style.cssText = 'text-align:center;padding:20px;color:var(--muted);font-size:12px;';
  footer.innerHTML = '<a href="javascript:showAdminLogin()" style="color:var(--muted);text-decoration:none;">管理登录</a>';
  footer.id = 'footerLogin';
  document.querySelector('.container').after(footer);
});

// 登陆后隐藏底部入口
setInterval(() => {
  const f = document.getElementById('footerLogin');
  if (f) f.style.display = (currentRole === 'admin' || currentWorker) ? 'none' : 'block';
}, 500);
</script>

</body>
</html>
